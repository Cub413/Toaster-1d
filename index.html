body{

}

.topbar, .toolbar, #overlay, .btn, .menuBtn{

/* TOP BAR */
.topbar{

/* LEFT TOOLBAR */
.toolbar{
    position:fixed;
    top:50%;
    left:8px;

    flex-direction:column;
    gap:8px;
    z-index:10;
}

.btn{
    width:36px;
    height:16px;
    background:#2424248C;
    color:white;
    border:none;
    
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
}
.btn1{
    width:36px;
    height:36px;
    background:#242424;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
}
/* MENU */
#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:center;

}



.menuBtn{

}

/* ================= RIGHT PANEL ================= */

#rightPanel {

    overflow-x: hidden;

}
#rightPanel::-webkit-scrollbar {
    display: none;
}

#rightPanel.closed {
    transform: translateX(100%);
}

#panelHeader {
    min-height: 40px;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: space-between;

.left {

#646464

<script type="module">

import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { TransformControls } from "three/addons/controls/TransformControls.js";

/* SCENE */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x3a3a3a);

/* CAMERA */
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(4,4,4);

/* RENDER */
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
/* GIZMO */

const gizmoCanvas = document.getElementById("axisGizmo");

const gizmoRenderer = new THREE.WebGLRenderer({
    canvas:gizmoCanvas,
    alpha:true,
    antialias:true
});
const gizmoRaycaster = new THREE.Raycaster();
const gizmoMouse = new THREE.Vector2();
gizmoCanvas.style.pointerEvents = "auto";
gizmoRenderer.setSize(120,120,false);
gizmoRenderer.setPixelRatio(window.devicePixelRatio);

const gizmoScene = new THREE.Scene();

const gizmoCamera = new THREE.PerspectiveCamera(50,1,0.1,10);
gizmoCamera.position.set(0,0,3);

const gizmoGroup = new THREE.Group();

gizmoScene.add(gizmoGroup);
/* CONTROLS */
const orbit = new OrbitControls(camera,renderer.domElement);
const loader = new GLTFLoader();
/* TRANSFORM */
const transform = new TransformControls(camera,renderer.domElement);
scene.add(transform);
transform.setMode("translate");
transform.addEventListener("dragging-changed",(e)=>{
    orbit.enabled = !e.value;
});
const gltfLoader = new GLTFLoader();
/* LIGHTS */
scene.add(new THREE.AmbientLight(0xffffff,1));

const dir = new THREE.DirectionalLight(0xffffff,2);
dir.userData.type = "light";
dir.position.set(5,10,5);
scene.add(dir);

/* GRID */
scene.add(new THREE.GridHelper(20,20));

/* variables */
let selectedMaterialTarget = null;
let currentTexture = null;
let currentView = "perspective";
let selectedInUI = null;
let objects = [];
let selected = null;
let lights = [];
const hideTexturePanelFor = new Set([
    "light",
    "spawn",
    "camera"
]);
const texturePanel = document.getElementById("texturePanel");

function updateTexturePanelVisibility(obj) {
    if (!obj || hideTexturePanelFor.has(obj.userData.type)) {
        texturePanel.style.display = "none";
    } else {
        texturePanel.style.display = "block";
    }
}
window.openPanel2 = function(t, txt) {
  document.getElementById("title2").innerText = t;
  document.getElementById("text2").innerText = txt;
  document.getElementById("panel2").style.display = "flex";
};

window.closePanel2 = function(e) {
  if (e) e.stopPropagation();
  document.getElementById("panel2").style.display = "none";
};

window.closeSplash2 = function(e) {
  document.getElementById("overlay2").style.display = "none";
};

/* AUTO OPEN AL INICIAR */
window.addEventListener("load", () => {
  document.getElementById("overlay2").style.display = "flex";
});
/* SPAWN */
const lightTexture = new THREE.TextureLoader().load("archivos/light.png");
function faceCamera(obj){
    obj.lookAt(camera.position);
}
const tex = new THREE.TextureLoader().load("archivos/crosshairs-solid-full.svg");

const spawn = new THREE.Mesh(
    new THREE.PlaneGeometry(1,1),
    new THREE.MeshBasicMaterial({map:tex,transparent:true})
);
spawn.userData.type = "spawn";
spawn.position.set(0,0,0);
scene.add(spawn);

function updateSpawn(){
    spawn.lookAt(camera.position);
}

/* RAYCAST */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

/* SELECT */
function select(obj) {
    selected = obj;
    selectedInUI = obj;
    updateTexturePanelVisibility(obj);
    transform.addEventListener("dragging-changed", (e) => {
    orbit.enabled = !e.value;
    updateTexturePanelVisibility(obj);
});
    transform.attach(obj);
    selectedMaterialTarget = obj; // 👈 clave para textura

    loadTextureFromObject(obj); 
    refreshOutliner();
    
    if (lights.includes(obj)) {
        transform.setMode("translate");
        updateTexturePanelVisibility(obj);
    }
}

    selected = null;

let isDragging = false;
let startX = 0;
let startY = 0;

renderer.domElement.addEventListener("pointerdown", (e) => {
    startX = e.clientX;
    startY = e.clientY;
    isDragging = false;
});

renderer.domElement.addEventListener("pointermove", (e) => {
    if (Math.abs(e.clientX - startX) > 5 || Math.abs(e.clientY - startY) > 5) {
        isDragging = true;
    }
});

renderer.domElement.addEventListener("pointerup", (e) => {
    
    if (isDragging) return;
    if (transform.dragging) return;
    
    mouse.x = (e.clientX / innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    
    const hits = raycaster.intersectObjects(scene.children, true);
    
    // filtra cosas que NO deben bloquear deselección
    const validHits = hits.filter(h => {
        const obj = getRootObject(h.object);
        return obj && obj !== spawn; // evita spawn bloqueando click vacío
    });
    
    if (validHits.length > 0) {
        const root = getRootObject(validHits[0].object);
        select(root);
    } else {
        clear(); // <-- ahora sí funciona siempre
    }

});

function createAxis(color, axis, labelText) {
    
    const group = new THREE.Group();
    
    // MATERIAL
    const mat = new THREE.MeshBasicMaterial({
        color: color,
        transparent: true,
        opacity: 1
    });
    
    // línea
    const line = new THREE.Mesh(
        new THREE.CylinderGeometry(0.025, 0.025, 0.7, 16),
        mat
    );
    
    // esfera punta
    const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.09, 24, 24),
        mat
    );
    
    line.position.y = 0.35;
    sphere.position.y = 0.8;
    
    group.add(line);
    group.add(sphere);
    
    // TEXTO
    const canvas = document.createElement("canvas");
    canvas.width = 128;
    canvas.height = 128;
    
    const ctx = canvas.getContext("2d");
    
    ctx.fillStyle = "white";
    ctx.font = "bold 72px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    
    ctx.fillText(labelText, 64, 64);
    
    const tex = new THREE.CanvasTexture(canvas);
    
    const textMat = new THREE.MeshBasicMaterial({
        map: tex,
        transparent: true
    });
    
    const text = new THREE.Mesh(
        new THREE.PlaneGeometry(0.22, 0.22),
        textMat
    );
    
    text.position.y = 1.05;
    
    group.add(text);
    
    // ROTACIÓN
    if (axis === "x") {
        group.rotation.z = -Math.PI / 2;
    }
    
    if (axis === "z") {
        group.rotation.x = Math.PI / 2;
    }
    
    return group;
}

    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    
    // centro (opcional)
    if (x > 0.33 && x < 0.66 && y > 0.33 && y < 0.66) {
        resetPerspective();
        return;
    }
    
    // izquierda
    if (x < 0.33 && y > 0.33 && y < 0.66) {
        setView("nx");
        return;
    }
    
    // derecha
    if (x > 0.66 && y > 0.33 && y < 0.66) {
        setView("x");
        return;
    }
    
    // arriba
    if (y < 0.33) {
        setView("y");
        return;
    }
    
    // abajo
    if (y > 0.66) {
        setView("ny");
        return;

function setView(dir) {
    
    const distance = camera.position.length();
    
    const views = {
        x: new THREE.Vector3(distance, 0, 0),
        nx: new THREE.Vector3(-distance, 0, 0),
        y: new THREE.Vector3(0, distance, 0),
        ny: new THREE.Vector3(0, -distance, 0),
    };
    
    const target = views[dir];
    if (!target) return;
    
    animateCameraTo(target);
}
function resetPerspective() {
    orbit.target.set(0, 0, 0);
    
    camera.position.set(4, 4, 4);
    camera.lookAt(0, 0, 0);
    
    orbit.update();
}
function animateCameraTo(target){

    const startPos = camera.position.clone();

    let t = 0;

    function step(){
        t += 0.08;

        camera.position.lerpVectors(startPos, target, t);
        camera.lookAt(0,0,0);

        orbit.update();

        if(t < 1) requestAnimationFrame(step);
    }

    step();
}

    }
}
