}

/* ========================= */
/* TRACK */
/* ========================= */

#timelineTrack{

    position:relative;

    height:100%;
}

/* ========================= */
/* RULER */
/* ========================= */

#timelineRuler{

    position:relative;

    height:20px;

    background:#313131;

    border-bottom:1px solid #222;
}

/* ========================= */
/* FRAMES */
/* ========================= */

.frameContainer{

    position:absolute;

    top:0;
    left:0;

    height:100%;

    display:flex;
}

.frame{

    width:60px;

    height:100%;

    border-right:1px solid #3b3b3b;

    flex-shrink:0;

    position:relative;

    color:#d0d0d0;

    font-size:12px;

    display:flex;

    justify-content:center;

    align-items:flex-start;

    padding-top:4px;

    cursor:pointer;
}

.frame:hover{

    background:#404040;
}

.frame::after{

    content:"";

    position:absolute;

    bottom:0;
    left:50%;

    transform:translateX(-50%);

    width:1px;
    height:8px;

    background:#777;
}

/* ========================= */
/* CONTENT */
/* ========================= */

#timelineContent{

    position:relative;

    height:calc(100% - 32px);
}

/* ========================= */
/* GRID */
/* ========================= */

.grid{

    position:absolute;

    inset:0;

    display:flex;
}

.gridLine{

    width:60px;

    height:100%;

    border-right:1px solid #383838;

    flex-shrink:0;
}

    let material = null;

    obj.traverse((child) => {

        if (child.isMesh && child.material && !material) {
            material = child.material;
        }
    });

    if (!material) return;

    // COLOR
    document.getElementById("materialColor").value =
        "#" + material.color.getHexString();

    // OPACIDAD
    document.getElementById("materialOpacity").value =
        material.opacity ?? 1;

    // TEXTURA TRANSPARENTE
    document.getElementById("transparentTextureToggle").checked =
        material.transparent === true;

            child.material.transparent = value < 1;

/* SELECT */
function select(obj) {
    selected = obj;
    selectedInUI = obj;
    updateTexturePanelVisibility(obj);
    transform.addEventListener("dragging-changed", (e) => {
    
    orbit.enabled = !e.value;
    
    // impedir box select mientras usa gizmo
    if (e.value) {
        
        multiSelectMode = false;
        
        isBoxSelecting = false;
        
        clearTimeout(holdTimeout);
        
        selectionBox.style.display = "none";
    }
});
    if (viewportMode !== "render") {
    
    transform.visible = true;
    transform.attach(obj);
    
} else {
    
    transform.detach();
    transform.visible = false;
}
    selectedMaterialTarget = obj; // 👈 clave para textura

    loadTextureFromObject(obj); 
    refreshOutliner();

/* CLICK */
let isDragging = false;
let startX = 0;
let startY = 0;

renderer.domElement.addEventListener("pointerdown", (e) => {
    
    if (transform.dragging) return;
    
    startX = e.clientX;
    startY = e.clientY;
    
    isDragging = false;
    
    multiSelectMode = false;
    
    holdTimeout = setTimeout(() => {
        
        // si movió el dedo NO activar
        if (isDragging) return;
        
        // usando gizmo
        if (transform.dragging) return;
        
        multiSelectMode = true;
        
        isBoxSelecting = true;
        
        // bloquear cámara
        orbit.enabled = false;

if (activeSceneCamera) {
    
    orbit.target.copy(
        activeSceneCamera.position
    );
}
        
        selectionStartX = e.clientX;
        selectionStartY = e.clientY;
        
        selectionBox.style.display = "block";
        
        selectionBox.style.left =
            selectionStartX + "px";
        
        selectionBox.style.top =
            selectionStartY + "px";
        
        selectionBox.style.width = "0px";
        
        selectionBox.style.height = "0px";
        
    }, 1500);
});
renderer.domElement.addEventListener("pointermove", (e) => {
    
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    
    // =========================
    // MOVIMIENTO NORMAL
    // =========================
    
    if (!multiSelectMode) {
        
        if (
            Math.abs(dx) > 12 ||
            Math.abs(dy) > 12
        ) {
            
            isDragging = true;
            
            clearTimeout(holdTimeout);
        }
    }
    
    // =========================
    // BOX SELECT
    // =========================
    
    if (multiSelectMode) {
        
        const x =
            Math.min(selectionStartX, e.clientX);
        
        const y =
            Math.min(selectionStartY, e.clientY);
        
        const w =
            Math.abs(e.clientX - selectionStartX);
        
        const h =
            Math.abs(e.clientY - selectionStartY);
        
        selectionBox.style.left = x + "px";
        
        selectionBox.style.top = y + "px";
        
        selectionBox.style.width = w + "px";
        
        selectionBox.style.height = h + "px";
    }
});
renderer.domElement.addEventListener("pointerup", (e) => {
    
    clearTimeout(holdTimeout);
    
    // BOX SELECT
    if (multiSelectMode) {
        
        selectionBox.style.display = "none";
        
        selectMultipleInBox(
            selectionStartX,
            selectionStartY,
            e.clientX,
            e.clientY
        );
        
        updateSelectionGroup();
        
        multiSelectMode = false;
        
        isBoxSelecting = false;
        
        unlockCamera();
        
        return;
    }
    
    if (isDragging) return;
    
    if (transform.dragging) return;
    
    mouse.x = (e.clientX / innerWidth) * 2 - 1;
    
    mouse.y = -(e.clientY / innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    
    const hits =
        raycaster.intersectObjects(scene.children, true);
    
    const validHits = hits.filter(h => {
        
        const obj = getRootObject(h.object);
        
        return obj && obj !== spawn;
    });
    
    if (validHits.length > 0) {
        
        const root =
            getRootObject(validHits[0].object);
        
        clearMultiSelection();
        
        selectedObjects = [root];
        
        updateSelectionGroup();
        
        select(root);
        
    } else {
        
        clear();
        
        clearMultiSelection();
    }
});

function createAxis(color, axis, labelText) {
    
    const group = new THREE.Group();
    
    // MATERIAL
    const mat = new THREE.MeshBasicMaterial({
        color: color,
        transparent: true,
        opacity: 1
    });
    
    // línea
    const line = new THREE.Mesh(
        new THREE.CylinderGeometry(0.025, 0.025, 0.7, 16),
        mat
    );
    
    // esfera punta
    const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.09, 24, 24),
        mat
    );
    
    line.position.y = 0.35;
    sphere.position.y = 0.8;
    
    group.add(line);
    group.add(sphere);
    
    // TEXTO
    const canvas = document.createElement("canvas");
    canvas.width = 128;
    canvas.height = 128;
    
    const ctx = canvas.getContext("2d");
    
    ctx.fillStyle = "white";
    ctx.font = "bold 72px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    
    ctx.fillText(labelText, 64, 64);
    
    const tex = new THREE.CanvasTexture(canvas);
    
    const textMat = new THREE.MeshBasicMaterial({
        map: tex,
        transparent: true
    });
    
    const text = new THREE.Mesh(
        new THREE.PlaneGeometry(0.22, 0.22),
        textMat
    );
    
    text.position.y = 1.05;
    
    group.add(text);
    
    // ROTACIÓN
    if (axis === "x") {
        group.rotation.z = -Math.PI / 2;
    }
    
    if (axis === "z") {
        group.rotation.x = Math.PI / 2;
    }
    
    return group;
}

gizmoCanvas.addEventListener("pointerdown", (e) => {
    
    const rect = gizmoCanvas.getBoundingClientRect();
    
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    
    // centro (opcional)
    if (x > 0.33 && x < 0.66 && y > 0.33 && y < 0.66) {
        resetPerspective();
        return;
    }
    
    // izquierda
    if (x < 0.33 && y > 0.33 && y < 0.66) {
        setView("nx");
        return;
    }
    
    // derecha
    if (x > 0.66 && y > 0.33 && y < 0.66) {
        setView("x");
        return;
    }
    
    // arriba
    if (y < 0.33) {
        setView("y");
        return;
    }
    
    // abajo
    if (y > 0.66) {
        setView("ny");
        return;
    }
});
function setView(dir) {
    
    const distance = camera.position.length();
    
    const views = {
        x: new THREE.Vector3(distance, 0, 0),
        nx: new THREE.Vector3(-distance, 0, 0),
        y: new THREE.Vector3(0, distance, 0),
        ny: new THREE.Vector3(0, -distance, 0),
    };
    
    const target = views[dir];
    if (!target) return;
    
    animateCameraTo(target);
}
function resetPerspective() {
    orbit.target.set(0, 0, 0);
    
    camera.position.set(4, 4, 4);
    camera.lookAt(0, 0, 0);
    
    orbit.update();
}
function animateCameraTo(target){

    const startPos = camera.position.clone();

    let t = 0;

    function step(){
        t += 0.08;

        camera.position.lerpVectors(startPos, target, t);
        camera.lookAt(0,0,0);

        orbit.update();

        if(t < 1) requestAnimationFrame(step);
    }

    step();
}

async function renderVideoFrames() {

        parseInt(startFrame.value) || 0;
    
    const end =
        parseInt(endFrame.value) || 100;
    
    const fps =
        parseInt(fpsInput.value) || 30;
    
    const frames = [];
    
    renderOverlay.style.display = "flex";
    
    for (let i = start; i <= end; i++) {
        
        try {
            
            currentFrame = i;
            
            // timeline
            if (typeof setFrame === "function") {
                
                setFrame(i);
            }
            
            // render
            const renderCamera =
                (
                    usingSceneCamera &&
                    activeSceneCamera &&
                    activeSceneCamera.userData &&
                    activeSceneCamera.userData.camera
                ) ?
                activeSceneCamera.userData.camera :
                camera;
            
            renderer.render(
                scene,
                renderCamera
            );
            
            // guardar frame
            frames.push(
                renderer.domElement.toDataURL(
                    "image/jpeg",

                )
            );
            
            // actualizar barra
            const percent = Math.floor(
                ((i - start + 1) /

            );

                requestAnimationFrame(resolve)
            );

            );
        }

    );

    createVideoFromFrames(
        frames,
        fps
    );

async function createVideoFromFrames(
    frames,
    fps
) {
    
    const canvas =
        document.createElement("canvas");
    
    canvas.width =
        renderer.domElement.width;
    
    canvas.height =
        renderer.domElement.height;
    
    const ctx =
        canvas.getContext("2d");
    
    const stream =
        canvas.captureStream(fps);
    
    const recorder =
        new MediaRecorder(stream);
    
    const chunks = [];
    
    recorder.ondataavailable = e => {
        
        if (e.data.size > 0) {
            
            chunks.push(e.data);
        }
    };
    
    recorder.start();
    
    for (let i = 0; i < frames.length; i++) {
        
        const img = new Image();
        
        img.src = frames[i];
        
        await new Promise(resolve => {
            
            img.onload = () => {
                
                ctx.drawImage(
                    img,
                    0,
                    0,
                    canvas.width,
                    canvas.height
                );
                
                resolve();
            };
        });
        
        await new Promise(resolve =>
            setTimeout(
                resolve,
                1000 / fps
            )
        );
    }
    
    recorder.stop();
    
    recorder.onstop = () => {
        
        const blob =
            new Blob(chunks, {
                type: "video/webm"
            });
        
        const url =
            URL.createObjectURL(blob);
        
        renderVideoPreview.src =
            url;
        
        downloadRenderBtn.href =
            url;
        
        renderResult.style.display =
            "flex";
    };
}

function randomDelay(min, max) {

    return Math.random() * (max - min) + min;
}

/* FADE IN */

function fadeIn(audio, duration = 6000, target = 0.35) {

    audio.volume = 0;

    const step = target / (duration / 100);

    const interval = setInterval(() => {

        audio.volume += step;

        if (audio.volume >= target) {

            audio.volume = target;

            clearInterval(interval);
        }

    }, 100);
}

/* FADE OUT */

function fadeOut(audio, duration = 6000) {

    return new Promise((resolve) => {

        const step = audio.volume / (duration / 100);

        const interval = setInterval(() => {

            audio.volume -= step;

            if (audio.volume <= 0) {

                audio.volume = 0;

                clearInterval(interval);

                resolve();
            }

        }, 100);
    });
}

/* PLAY TRACK */

async function playTrack(index) {

    currentTrack = index % playlist.length;

    bgMusic.src = playlist[currentTrack];

    bgMusic.currentTime = 0;

    try {

        await bgMusic.play();

        fadeIn(bgMusic);

    } catch(err) {

        console.log(err);

        return;
    }

    // antes de terminar → fade out
    bgMusic.onloadedmetadata = () => {

        const fadeTime = 6000;

        const trigger =
            (bgMusic.duration * 1000) - fadeTime;

        setTimeout(async () => {

            await fadeOut(bgMusic, fadeTime);

        }, trigger);
    };

    // cuando termina
    bgMusic.onended = () => {

        const silence =
            randomDelay(120000, 300000);

        console.log(
            "silencio:",
            Math.floor(silence / 1000),
            "seg"
        );

        setTimeout(() => {

            playTrack(currentTrack + 1);

        }, silence);
    };
}

    );

function setViewportMode(mode) {
    
    viewportMode = mode;
    renderer.shadowMap.enabled = (mode === "render");
    const isRender = mode === "render";
    const isSolid = mode === "solid";
    const isWire = mode === "wireframe";
    const isTexture = mode === "texture";
    
    // =========================
    // TRANSFORM CONTROLS
    // =========================
    
    transform.visible = !isRender;
    
    // =========================
    // GRID
    // =========================
    
    grid.visible = !isRender;
    
    // =========================
    // SPAWN
    // =========================
    
    spawn.visible = !isRender;
    
    // =========================
    // ICONOS / HELPERS
    // =========================
    
    objects.forEach(obj => {
        
        // ocultar iconos editor
        if (obj.userData.editorUI) {
            
            obj.visible = !isRender;
        }
        
        // luces
        if (obj.userData.type === "light") {
            
            obj.visible = !isRender;
        }
        
        // materiales
        obj.traverse(child => {
            
            if (!child.isMesh || !child.material) return;
            
if (!child.userData.originalMaterial) {
    
    child.userData.originalMaterial =
        child.material.clone();
}

// guardar mapa correcto
child.userData.originalMaterial.map =
    child.material.map || null;
            // =====================
            // WIREFRAME
            // =====================
            
            if (isWire) {
                
                child.material.wireframe = true;
                child.material.map = null;
            }
            
            // =====================
            // SOLID
            // =====================
            
            else if (isSolid) {
                
                child.material.wireframe = false;
                
                // quitar textura
                child.material.map = null;
                
                child.material.needsUpdate = true;
            }
            
            // =====================
            // TEXTURE
            // =====================
            
            else if (isTexture) {
                
                child.material.wireframe = false;
                
                const original =
                    child.userData.originalMaterial;
                
                if (original?.map) {
                    
                    child.material.map = original.map;
                }
                objects.forEach(obj => {

    restoreOriginalMaterials(obj);
});
                child.material.needsUpdate = true;
            }
            
            // =====================
            // RENDER
            // =====================
            
            else if (isRender) {
                
                child.material.wireframe = false;
                
                const original =
                    child.userData.originalMaterial;
                
                if (original) {
                    
                    child.material.map = original.map || null;
                    
                    child.material.color.copy(
                        original.color
                    );
                    
                    child.material.opacity =
                        original.opacity;
                    
                    child.material.transparent =
                        original.transparent;
                }
                
                child.material.needsUpdate = true;
            }
        });
    });
}

function updateSelectionGroup(){

    // limpiar grupo anterior
    if (selectionGroup) {

        scene.remove(selectionGroup);
    }

    if (selectedObjects.length <= 1) {

        if (selectedObjects.length === 1) {

            transform.attach(selectedObjects[0]);
        }

        return;
    }

    // calcular centro
    const center = new THREE.Vector3();

    selectedObjects.forEach(obj => {

        center.add(obj.position);
    });

    center.divideScalar(selectedObjects.length);

    // crear grupo virtual
    selectionGroup = new THREE.Object3D();

    selectionGroup.position.copy(center);

    scene.add(selectionGroup);

    transform.attach(selectionGroup);
}

function startPlayback() {
    
    clearInterval(playInterval);

        setInterval(() => {

                currentFrame + 1;
            
            if (next > endFrame) {
                
                next = startFrame;
            }
            
            setFrame(next);
            
        }, 1000 / fps);
}

function stopPlayback() {
    
    clearInterval(playInterval);
}

/* KEYFRAMES */
/* ========================= */

/* ========================= */
/* OBJECT ANIMATION SYSTEM */
/* ========================= */

function getSelectedObject() {
    
    return selected || null;
}

/* crear estructura animation */

function ensureAnimationData(object){

    if(!object.userData.animation){

        object.userData.animation = {

            keyframes:[]
        };
    }
}

/* obtener keyframe */

function getKeyframe(
    object,
    frame
){

    ensureAnimationData(object);

    return object
    .userData
    .animation
    .keyframes
    .find(k => k.frame === frame);
}

/* guardar keyframe */

function saveKeyframe(){

    const object =
        getSelectedObject();

    if(!object) return;

    ensureAnimationData(object);

    const existing =
        getKeyframe(
            object,
            currentFrame
        );

    const data = {

        frame: currentFrame,

        position: {
            x: object.position.x,
            y: object.position.y,
            z: object.position.z
        },

        rotation: {
            x: object.rotation.x,
            y: object.rotation.y,
            z: object.rotation.z
        },

        scale: {
            x: object.scale.x,
            y: object.scale.y,
            z: object.scale.z
        }
    };

    if(existing){

        Object.assign(
            existing,
            data
        );

    }else{

        object
        .userData
        .animation
        .keyframes
        .push(data);
    }

    renderObjectKeyframes();
}
/* ========================= */
/* APPLY ANIMATION */
/* ========================= */

/* ========================= */
/* APPLY INTERPOLATED ANIMATION */
/* ========================= */

/* ========================= */
/* APPLY ALL ANIMATIONS */
/* ========================= */

function applyAnimationFrame(){

    scene.traverse(object => {

        if(
            !object.userData.animation
        ) return;

        const keyframes =
            object
            .userData
            .animation
            .keyframes;

        if(
            !keyframes ||
            keyframes.length === 0
        ) return;

        /* ordenar */

        keyframes.sort(
            (a,b) =>
            a.frame - b.frame
        );

        /* key exacto */

        const exact =
            keyframes.find(
                k =>
                k.frame === currentFrame
            );

        if(exact){

            applyKeyframe(
                object,
                exact
            );

            return;
        }

        /* buscar anterior/siguiente */

        let previous = null;
        let next = null;

        for(
            let i = 0;
            i < keyframes.length;
            i++
        ){

            const kf =
                keyframes[i];

            if(
                kf.frame < currentFrame
            ){

                previous = kf;
            }

            if(
                kf.frame > currentFrame
            ){

                next = kf;

                break;
            }
        }

        /* extremos */

        if(!previous && next){

            applyKeyframe(
                object,
                next
            );

            return;
        }

        if(previous && !next){

            applyKeyframe(
                object,
                previous
            );

            return;
        }

        if(
            !previous ||
            !next
        ) return;

        /* interpolación */

        const range =
            next.frame -
            previous.frame;

        const t =
            (
                currentFrame -
                previous.frame
            ) / range;

        /* POSITION */

        object.position.set(

            lerp(
                previous.position.x,
                next.position.x,
                t
            ),

            lerp(
                previous.position.y,
                next.position.y,
                t
            ),

            lerp(
                previous.position.z,
                next.position.z,
                t
            )
        );

        /* ROTATION */

        object.rotation.set(

            lerp(
                previous.rotation.x,
                next.rotation.x,
                t
            ),

            lerp(
                previous.rotation.y,
                next.rotation.y,
                t
            ),

            lerp(
                previous.rotation.z,
                next.rotation.z,
                t
            )
        );

        /* SCALE */

        object.scale.set(

            lerp(
                previous.scale.x,
                next.scale.x,
                t
            ),

            lerp(
                previous.scale.y,
                next.scale.y,
                t
            ),

            lerp(
                previous.scale.z,
                next.scale.z,
                t
            )
        );

    });
}
function applyKeyframe(
    object,
    keyframe
){

    object.position.set(
        keyframe.position.x,
        keyframe.position.y,
        keyframe.position.z
    );

    object.rotation.set(
        keyframe.rotation.x,
        keyframe.rotation.y,
        keyframe.rotation.z
    );

    object.scale.set(
        keyframe.scale.x,
        keyframe.scale.y,
        keyframe.scale.z
    );
}

/* ========================= */
/* LERP */
/* ========================= */

function lerp(a,b,t){

    return a + (b - a) * t;
}
/* borrar keyframe */

function updateTimelineFrame(){

    // aplicar timeline
    if(typeof setFrame === "function"){

        setFrame(currentFrame);
    }

    // elegir cámara
    const renderCamera =
        (
            usingSceneCamera &&
            activeSceneCamera &&
            activeSceneCamera.userData &&
            activeSceneCamera.userData.camera
        )
        ? activeSceneCamera.userData.camera
        : camera;

    // renderizar escena
    renderer.render(
        scene,
        renderCamera
    );
}
function updateTimelineRange(){

    startFrame =
        parseInt(startInput.value);

    endFrame =
        parseInt(endInput.value);

    /* evitar rango invertido */

    if(startFrame > endFrame){

        [
            startFrame,
            endFrame
        ] =
        [
            endFrame,
            startFrame
        ];
    }

    /* limitar frame actual */

    if(currentFrame < startFrame){

        currentFrame = startFrame;
    }

    if(currentFrame > endFrame){

        currentFrame = endFrame;
    }

    /* reconstruir */

    buildTimeline();

    setFrame(currentFrame);
}

document.getElementById("renderVideoBtn")
.onclick = async () => {

    renderMenu.style.display = "none";

    renderOverlay.style.display = "flex";

    const fps =
    parseInt(fpsInput.value) || 30;

    const start =
    parseInt(startFrame.value) || 0;

    const end =
    parseInt(endFrame.value) || 100;

    const totalFrames =
    end - start + 1;

    // cambiar viewport
    setViewportMode("render");

    const stream =
    renderer.domElement.captureStream(fps);

    const recorder =
    new MediaRecorder(stream, {

        mimeType:"video/webm"
    });

    const chunks = [];

    recorder.ondataavailable = e => {

        if(e.data.size > 0){

            chunks.push(e.data);
        }
    };

    recorder.start();

    for(let i = start; i <= end; i++){

        currentFrame = i;

        updateTimelineFrame();

        const percent =
        Math.floor(
            ((i - start + 1) / totalFrames) * 100
        );

        renderPercent.textContent =
        percent + "%";

        renderBarFill.style.width =
        percent + "%";

        await new Promise(r =>
            setTimeout(r, 1000 / fps)
        );
    }

    recorder.stop();

    recorder.onstop = () => {

        renderOverlay.style.display = "none";

        const blob =
        new Blob(chunks, {

            type:"video/webm"
        });

        const url =
        URL.createObjectURL(blob);

        renderVideoPreview.src = url;

        downloadRenderBtn.href = url;

        renderResult.style.display = "flex";
    };
};
